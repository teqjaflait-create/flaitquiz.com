<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flait Test</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    header {
        padding: 20px;
        font-size: 30px;
        font-weight: bold;
        background: #020617;
    }

    .container {
        margin-top: 50px;
    }

    input {
        padding: 10px;
        border: none;
        border-radius: 10px;
        outline: none;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        font-size: 16px;
        margin-left: 10px;
        transition: 0.3s;
    }

    button:hover {
        background: #2563eb;
        transform: scale(1.05);
    }

    .result {
        margin-top: 30px;
        font-size: 20px;
        font-weight: bold;
    }

    .card {
        margin: 20px auto;
        padding: 20px;
        width: 300px;
        border-radius: 20px;
        background: #1e293b;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
</style>
</head>

<body>

<header>🔥 Flait Test Website 🔥</header>

<div class="container">
    <div class="card">
        <h2>Enter your name</h2>
        <input type="text" id="nameInput" placeholder="Type here...">
        <button onclick="checkName()">Submit</button>

        <div class="result" id="result"></div>
    </div>

    <div class="card">
        <h2>Mini Quiz</h2>
        <p>Who is the best football club?</p>
        <button onclick="quiz('milan')">AC Milan</button>
        <button onclick="quiz('other')">Other</button>

        <div class="result" id="quizResult"></div>
    </div>
</div>

<script>
function checkName() {
    let name = document.getElementById("nameInput").value;
    let result = document.getElementById("result");

    if(name.toLowerCase() === "flait") {
        result.innerHTML = "👑 Welcome legend Flait!";
    } else if(name === "") {
        result.innerHTML = "⚠️ Enter something bro...";
    } else {
        result.innerHTML = "😎 Welcome " + name;
    }
}

function quiz(answer) {
    let result = document.getElementById("quizResult");

    if(answer === "milan") {
        result.innerHTML = "🔥 Correct choice!";
    } else {
        result.innerHTML = "❌ Wrong... rethink your life";
    }
}
</script>

</body>
</html>
